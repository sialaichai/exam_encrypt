<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Decryptor Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; max-width: 700px; margin: 0 auto; background: #fdf0f0; line-height: 1.6; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #b22222; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 12px; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-red { background: #dc3545; }
        .btn-orange { background: #fd7e14; }
        .status { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 0.9em; }
        .status-success { background: #d4edda; color: #155724; }
        pre { background: #f8f9fa; padding: 10px; border: 1px solid #ddd; overflow-x: auto; font-size: 0.8em; max-height: 200px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Global Settings</h2>
        <label>Enter Access Password:</label>
        <input type="password" id="password" placeholder="Enter the decryption password">
    </div>

    <div class="card">
        <h2>Step 1: Decrypt payload.enc</h2>
        <label>Select payload.enc:</label>
        <input type="file" id="payloadInput">
        <button class="btn-red" onclick="decryptPayload()">Decrypt & View Data</button>
        <div id="status1" class="status"></div>
        <div id="jsonPreview" style="display:none;">
            <label>Folder Name:</label>
            <input type="text" id="extractedFolder" readonly>
            <label>JSON Data:</label>
            <pre id="jsonContent"></pre>
        </div>
    </div>

    <div class="card">
        <h2>Step 2: Decrypt PDFs (Individual)</h2>
        <input type="file" id="pdfFiles" multiple>
        <button class="btn-orange" onclick="decryptPDFFiles()">Decrypt & Download PDFs</button>
    </div>

    <div class="card">
        <h2>Step 3: Decrypt ZIP Bundle</h2>
        <label>Select encrypted_pdfs.zip:</label>
        <input type="file" id="zipInput">
        <button class="btn-orange" onclick="decryptZipBundle()">Decrypt & Re-ZIP</button>
        <div id="status3" class="status"></div>
    </div>

    <script>
        // Helper: Convert CryptoJS WordArray to Uint8Array for file saving
        function wordArrayToUint8Array(wordArray) {
            const l = wordArray.sigBytes;
            const words = wordArray.words;
            const result = new Uint8Array(l);
            for (let i = 0; i < l; i++) {
                result[i] = (words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff;
            }
            return result;
        }

        // --- STEP 1: Decrypt JSON Bundle ---
        function decryptPayload() {
            const pass = document.getElementById('password').value;
            const fileInput = document.getElementById('payloadInput');
            const status = document.getElementById('status1');
            
            if (!pass || !fileInput.files[0]) return alert("Password and file required.");

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const encryptedData = e.target.result;
                    const bytes = CryptoJS.AES.decrypt(encryptedData, pass);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (!decryptedString) throw new Error("Incorrect password or corrupted file.");
                    
                    const bundle = JSON.parse(decryptedString);
                    
                    document.getElementById('jsonPreview').style.display = 'block';
                    document.getElementById('extractedFolder').value = bundle.secure_folder;
                    document.getElementById('jsonContent').innerText = JSON.stringify(bundle.data, null, 2);
                    
                    status.className = "status status-success";
                    status.innerText = "Payload successfully decrypted!";
                } catch (err) {
                    alert("Decryption failed: " + err.message);
                }
            };
            reader.readAsText(fileInput.files[0]);
        }

        // --- STEP 2: Decrypt Individual PDFs ---
        async function decryptPDFFiles() {
            const pass = document.getElementById('password').value;
            const files = document.getElementById('pdfFiles').files;
            if (!pass || files.length === 0) return alert("Password and files required.");

            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const encryptedData = e.target.result;
                        const decrypted = CryptoJS.AES.decrypt(encryptedData, pass);
                        const uint8 = wordArrayToUint8Array(decrypted);
                        
                        if (uint8.length === 0) throw new Error("Decryption failed.");
                        
                        downloadBlob(new Blob([uint8], {type: "application/pdf"}), "decrypted_" + file.name);
                    } catch (err) {
                        alert("Error decrypting " + file.name + ": Check your password.");
                    }
                };
                reader.readAsText(file);
            }
        }

        // --- STEP 3: Decrypt ZIP Logic ---
        async function decryptZipBundle() {
            const pass = document.getElementById('password').value;
            const zipFile = document.getElementById('zipInput').files[0];
            const status = document.getElementById('status3');

            if (!pass || !zipFile) return alert("Password and ZIP file required.");

            status.innerText = "Unzipping and decrypting...";
            const zip = new JSZip();
            const newZip = new JSZip();

            try {
                const loadedZip = await zip.loadAsync(zipFile);
                const promises = [];

                loadedZip.forEach((relativePath, file) => {
                    if (!file.dir) {
                        const promise = file.async("text").then(content => {
                            const decrypted = CryptoJS.AES.decrypt(content, pass);
                            const uint8 = wordArrayToUint8Array(decrypted);
                            newZip.file(relativePath, uint8);
                        });
                        promises.push(promise);
                    }
                });

                await Promise.all(promises);
                const finalBlob = await newZip.generateAsync({type: "blob"});
                downloadBlob(finalBlob, "decrypted_files_bundle.zip");

                status.className = "status status-success";
                status.innerText = "Success! Decrypted ZIP downloaded.";
            } catch (err) {
                alert("ZIP processing failed: " + err.message);
            }
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const element = document.createElement('a');
            element.href = url;
            element.download = filename;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
